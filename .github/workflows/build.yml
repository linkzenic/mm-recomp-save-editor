name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build mod
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Build mod ELF
        run: make CC=clang LD=ld.lld

      - name: Download RecompModTool
        run: |
          curl -L \
            https://github.com/N64Recomp/N64Recomp/releases/download/mod-tool-release/RecompModTool \
            -o RecompModTool
          chmod +x RecompModTool

      - name: Package NRM
        run: ./RecompModTool mod.toml build

      - name: Upload NRM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mm-recomp-save-editor
          path: build/mm_recomp_save_editor.nrm
